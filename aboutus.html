<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="templates/header.css" />
        <link rel="stylesheet" href="templates/footer.css" />
        <link rel="stylesheet" href="css/bootstrap.min.css" />
        <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <title>Document</title>
        <style>
            body {
                height: 2000px;
                padding-top: 80px; /* Sesuaikan dengan tinggi navbar */
            }
        </style>
    </head>
    <body>
        <!-- Headerr -->
        <div id="header"></div>
        <!-- Header -->

        <script>
            // Fetch dan masukkan konten header ke dalam #header
            fetch('templates/header.html')
                .then((response) => response.text())
                .then(
                    (data) =>
                        (document.getElementById('header').innerHTML = data)
                )
                .catch((error) => console.error('Gagal memuat header:', error));

            // Memuat footer menggunakan Fetch API
            fetch('templates/footer.html')
                .then((response) => response.text())
                .then(
                    (data) =>
                        (document.getElementById('footer').innerHTML = data)
                )
                .catch((error) => console.error('Gagal memuat footer:', error));
        </script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="jsscript/efekscroll.js"></script>
        <script src="jsscript/popup.js"></script>
        <!-- Script -->
    </body>
</html>
